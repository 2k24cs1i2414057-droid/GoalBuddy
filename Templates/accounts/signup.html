<!-- signup.html -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – GoalBuddy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sora: ['Sora','sans-serif'] } } } }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; }
    h1,h2,h3,.font-sora { font-family: 'Sora', sans-serif; }

    .gradient-text {
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      box-shadow: 0 4px 24px rgba(99,102,241,0.45);
      transition: all 0.25s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(99,102,241,0.6); }
    .btn-primary:active { transform: translateY(0); }

    .card {
      background: #161525;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 1.25rem;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .inp {
      width: 100%;
      background: #1e1d30;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 0.75rem;
      color: #e2e8f0;
      font-size: 0.8125rem;
      padding: 0.65rem 0.875rem 0.65rem 2.5rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .inp::placeholder { color: #4a5070; }
    .inp:focus {
      border-color: rgba(99,102,241,0.55);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    select.inp { padding-left: 0.75rem; padding-right: 2rem; appearance: none; cursor: pointer; }

    .oauth-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: #1e1d30;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 0.75rem;
      color: #cbd5e1;
      font-size: 0.8125rem; font-weight: 500;
      padding: 0.625rem 1rem;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
    }
    .oauth-btn:hover { background: #252440; border-color: rgba(255,255,255,0.15); }

    .divider { display: flex; align-items: center; gap: 0.75rem; color: #3a3a5a; font-size: 0.7rem; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.07); }

    .strength-bar { height: 3px; border-radius: 99px; transition: width 0.3s, background 0.3s; }

    .badge {
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.7rem; color: #4a5070;
    }

    body {
      background: #0d0c1a;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse 65% 55% at 85% 5%, rgba(168,85,247,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 15% 90%, rgba(99,102,241,0.16) 0%, transparent 55%);
    }

    /* ── LIGHT MODE ── */
    body.light {
      background: #f1f5f9;
      background-image:
        radial-gradient(ellipse 65% 55% at 85% 5%, rgba(168,85,247,0.1) 0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 15% 90%, rgba(99,102,241,0.1) 0%, transparent 55%);
      color: #1e293b;
    }
    body.light .card { background: #ffffff !important; border-color: rgba(0,0,0,0.07) !important; box-shadow: 0 8px 40px rgba(0,0,0,0.1) !important; }
    body.light .inp { background: #f8fafc !important; border-color: #e2e8f0 !important; color: #1e293b !important; }
    body.light .inp::placeholder { color: #94a3b8 !important; }
    body.light .inp:focus { border-color: rgba(99,102,241,0.5) !important; }
    body.light .oauth-btn { background: #f8fafc !important; border-color: #e2e8f0 !important; color: #475569 !important; }
    body.light .oauth-btn:hover { background: #f1f5f9 !important; border-color: #cbd5e1 !important; }
    body.light .divider { color: #cbd5e1 !important; }
    body.light .divider::before, body.light .divider::after { background: #e2e8f0 !important; }
    /* Fix inline color overrides */
    body.light h2 { color: #0f172a !important; }
    body.light label span { color: #64748b !important; }
    body.light p { color: #64748b !important; }
    body.light label[style] { color: #475569 !important; }
    body.light .field-label-text { color: #475569 !important; }
    body.light .badge { color: #94a3b8 !important; }
    body.light select.inp { background: #f8fafc !important; }
    body.light .header-sub { color: #64748b !important; }
    body.light .signin-link-text { color: #475569 !important; }

    #themeToggle {
      position: fixed; top: 1rem; right: 1rem; z-index: 50;
      width: 2.25rem; height: 2.25rem; border-radius: 0.75rem;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    #themeToggle:hover { transform: scale(1.08); background: rgba(255,255,255,0.14); }
    body.light #themeToggle { background: #ffffff; border-color: #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    body.light #themeToggle:hover { background: #f1f5f9; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 99px; }

    input[type=checkbox] { accent-color: #6366f1; width: 1rem; height: 1rem; margin-top: 1px; cursor: pointer; }
  </style>
</head>
<body>

<!-- Theme Toggle -->
<button id="themeToggle" title="Toggle theme">
  <svg id="iconMoon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#a5b4fc" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
  <svg id="iconSun" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#f59e0b" stroke-width="2" style="display:none;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
</button>

<div style="width:100%;max-width:400px;">

  <!-- Header -->
  <div style="text-align:center;margin-bottom:1.25rem;">
    <p class="header-sub" style="color:#94a3b8;font-size:0.8125rem;">Welcome! Let's set up your account 🚀</p>
  </div>

  <div class="card" style="padding:1.5rem;">

    <!-- Logo -->
    <div style="display:flex;align-items:center;gap:0.625rem;margin-bottom:1.25rem;">
      <div class="btn-primary" style="width:2rem;height:2rem;border-radius:0.625rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <span class="font-sora gradient-text" style="font-weight:700;font-size:1.125rem;">GoalBuddy</span>
    </div>

    <h2 class="font-sora" style="font-weight:700;font-size:1.25rem;color:#f1f5f9;margin:0 0 0.2rem;">Create Account</h2>
    <p style="font-size:0.8rem;color:#64748b;margin:0 0 1.25rem;">Start your free journey to your dream career</p>

    <!-- OAuth -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem;">
      <button class="oauth-btn">
        <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="oauth-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Facebook
      </button>
    </div>

    <div class="divider" style="margin-bottom:1rem;">or continue with email</div>

    <!-- Fields -->
    <div style="display:flex;flex-direction:column;gap:0.75rem;">

      <!-- Full Name -->
      <div>
        <label style="display:block;font-size:0.8rem;font-weight:500;color:#94a3b8;margin-bottom:0.3rem;" class="field-label-text">Full Name</label>
        <div style="position:relative;">
          <svg style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:#4a5070;" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <input type="text" placeholder="Rahul Sharma" class="inp"/>
        </div>
      </div>

      <!-- Email -->
      <div>
        <label style="display:block;font-size:0.8rem;font-weight:500;color:#94a3b8;margin-bottom:0.3rem;" class="field-label-text">Email Address</label>
        <div style="position:relative;">
          <svg style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:#4a5070;" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <input type="email" placeholder="rahul@example.com" class="inp"/>
        </div>
      </div>

      <!-- Phone -->
      <div>
        <label style="display:block;font-size:0.8rem;font-weight:500;color:#94a3b8;margin-bottom:0.3rem;" class="field-label-text">Phone Number</label>
        <div style="display:flex;gap:0.5rem;">
          <div style="position:relative;flex-shrink:0;">
            <select class="inp" id="countryCode" style="padding-left:0.75rem;padding-right:2rem;width:auto;">
              <option value="+91">🇮🇳 +91</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+44">🇬🇧 +44</option>
              <option value="+61">🇦🇺 +61</option>
              <option value="+971">🇦🇪 +971</option>
              <option value="+65">🇸🇬 +65</option>
              <option value="+49">🇩🇪 +49</option>
              <option value="+81">🇯🇵 +81</option>
              <option value="+86">🇨🇳 +86</option>
              <option value="+33">🇫🇷 +33</option>
            </select>
            <svg style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);pointer-events:none;color:#4a5070;" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div style="position:relative;flex:1;">
            <svg style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:#4a5070;" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            <input type="tel" id="phoneInput" placeholder="98765 43210" maxlength="15" class="inp" oninput="validatePhone(this)"/>
          </div>
        </div>
        <p id="phoneError" style="font-size:0.7rem;color:#f87171;margin-top:0.2rem;display:none;">Please enter a valid phone number.</p>
      </div>

      <!-- Password -->
      <div>
        <label style="display:block;font-size:0.8rem;font-weight:500;color:#94a3b8;margin-bottom:0.3rem;" class="field-label-text">Password</label>
        <div style="position:relative;">
          <svg style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:#4a5070;" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" id="pwd1" placeholder="Min 8 characters" class="inp" oninput="updateStrength(this.value)"/>
        </div>
        <div style="display:flex;gap:0.375rem;margin-top:0.4rem;">
          <div style="flex:1;background:rgba(255,255,255,0.07);border-radius:99px;height:3px;overflow:hidden;"><div id="sb1" class="strength-bar" style="width:0;background:transparent;"></div></div>
          <div style="flex:1;background:rgba(255,255,255,0.07);border-radius:99px;height:3px;overflow:hidden;"><div id="sb2" class="strength-bar" style="width:0;background:transparent;"></div></div>
          <div style="flex:1;background:rgba(255,255,255,0.07);border-radius:99px;height:3px;overflow:hidden;"><div id="sb3" class="strength-bar" style="width:0;background:transparent;"></div></div>
          <div style="flex:1;background:rgba(255,255,255,0.07);border-radius:99px;height:3px;overflow:hidden;"><div id="sb4" class="strength-bar" style="width:0;background:transparent;"></div></div>
        </div>
        <p id="strengthText" style="font-size:0.7rem;color:#64748b;margin-top:0.2rem;"></p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label style="display:block;font-size:0.8rem;font-weight:500;color:#94a3b8;margin-bottom:0.3rem;" class="field-label-text">Confirm Password</label>
        <div style="position:relative;">
          <svg style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:#4a5070;" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          <input type="password" id="pwd2" placeholder="Re-enter password" class="inp"/>
        </div>
      </div>

      <!-- Terms -->
      <label style="display:flex;align-items:flex-start;gap:0.625rem;cursor:pointer;margin-top:0.1rem;">
        <input type="checkbox"/>
        <span style="font-size:0.775rem;color:#64748b;line-height:1.4;">I agree to the <a href="#" style="color:#818cf8;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">Terms of Service</a> and <a href="#" style="color:#818cf8;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">Privacy Policy</a></span>
      </label>

      <!-- CTA -->
      <a href="{% url 'dashboard' %}" class="btn-primary" style="display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.8rem;border-radius:0.75rem;color:white;font-weight:600;font-size:0.875rem;text-decoration:none;margin-top:0.2rem;font-family:'DM Sans',sans-serif;">
        Create My Account
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
      </a>
    </div>

    <p class="signin-link-text" style="text-align:center;font-size:0.8rem;color:#4a5070;margin-top:1rem;">
      Already have an account?
      <a href="{% url 'login' %}" style="color:#818cf8;font-weight:600;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">Sign in</a>
    </p>
  </div>

  <!-- Trust badges -->
  <div style="display:flex;align-items:center;justify-content:center;gap:1.25rem;margin-top:1rem;">
    <div class="badge">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="#22c55e" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      SSL Secured
    </div>
    <div class="badge">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="#818cf8" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      Privacy Protected
    </div>
    <div class="badge">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="#facc15" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
      50K+ Students
    </div>
  </div>

</div>

<script>
  const toggleBtn = document.getElementById('themeToggle');
  const moon = document.getElementById('iconMoon');
  const sun = document.getElementById('iconSun');
  const saved = localStorage.getItem('gb-theme');
  if (saved === 'light') { document.body.classList.add('light'); moon.style.display='none'; sun.style.display='block'; }
  toggleBtn.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light');
    moon.style.display = isLight ? 'none' : 'block';
    sun.style.display = isLight ? 'block' : 'none';
    localStorage.setItem('gb-theme', isLight ? 'light' : 'dark');
  });

  function updateStrength(val) {
    const colors = ['#f87171','#fb923c','#facc15','#22c55e'];
    const labels = ['Weak','Fair','Good','Strong'];
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById('sb' + i);
      if (i <= score) { el.style.width = '100%'; el.style.background = colors[score - 1]; }
      else { el.style.width = '0'; el.style.background = 'transparent'; }
    }
    const t = document.getElementById('strengthText');
    t.textContent = val.length ? labels[score - 1] || '' : '';
    t.style.color = val.length ? colors[score - 1] : '#64748b';
  }

  function validatePhone(input) {
    input.value = input.value.replace(/[^0-9\s\-]/g, '');
    const err = document.getElementById('phoneError');
    const digits = input.value.replace(/\D/g, '');
    err.style.display = (input.value.length > 0 && (digits.length < 7 || digits.length > 15)) ? 'block' : 'none';
  }
</script>
</body>
</html>
